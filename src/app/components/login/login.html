<div class="login-container">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Iniciar Sesión</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" formControlName="email" class="form-control" placeholder="ejemplo@correo.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" formControlName="password" class="form-control" placeholder="******">
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger p-2 small">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
